events {
    worker_connections 1024;
}

http {

    server {
        listen 8080;
        server_name localhost;

        location / {
            root ../tests/static/;
            jwt on;
            jwt_default_jwks file ../tests/test_nbf_fail.json;
            jwt_validate exp leeway 10;
            jwt_validate nbf leeway 5;
            jwt_validate food "\"bar\"";
            jwt_extract foo bar optional;
            jwt_error_code 405;
        }
    }
}