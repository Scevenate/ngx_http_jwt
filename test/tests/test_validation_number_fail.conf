events {
    worker_connections 1024;
}

http {

    server {
        listen 8080;
        server_name localhost;

        location / {
            root ../tests/static/;
            jwt on;
            jwt_default_jwks file ../tests/test_validation_number_fail.json;
            jwt_validate exp leeway 5;
            jwt_validate nbf leeway 5;
            jwt_validate food "\"bar\"";
            jwt_validate price 100.75;
            jwt_validate amount 3;
            jwt_validate discount -4.9;
            jwt_validate organization_id 0;
            jwt_validate api_key null;
        }
    }
}