events {
    worker_connections 1024;
}

http {

    server {
        listen 8080;
        server_name localhost;

        location / {
            proxy_pass http://localhost:8081;
            jwt on;
            jwt_default_jwks file ../tests/test_success_1.json;
            jwt_validate exp leeway 5;
            jwt_validate nbf leeway 5;
            jwt_validate banner_name "\"承诺\"";
            jwt_validate api_version 0;
            jwt_validate game_version 1.41;
            jwt_validate metadata "{\"type\": \"pull request\", \"DSCP\": {\"enable\": false}}";
            jwt_validate fragment false;
            jwt_validate last_fragment true;
            jwt_validate priority null;
            jwt_validate p "[\"a\", \"b\", \"c\", null]";
            jwt_extract banner_name banner_name;
            jwt_extract pulls pulls;
            jwt_extract admin admin optional;
        }
    }
}